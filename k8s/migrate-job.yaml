# This runs the dropwizard migrate command once to update the DB schema before the app starts serving traffic.
apiVersion: batch/v1
kind: Job
metadata:
  name: bookcatalog-migrate
spec:
  template:
    metadata:
      name: bookcatalog-migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: book-catalog:latest
          imagePullPolicy: Never
          command: ["java", "-jar", "book-catalog-1.0-SNAPSHOT.jar", "db", "migrate", "src/main/resources/config.yml"]
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: book-config
                  key: DATABASE_URL
            - name: DATABASE_USER
              valueFrom:
                configMapKeyRef:
                  name: book-config
                  key: DATABASE_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: book-secrets
                  key: DATABASE_PASSWORD
