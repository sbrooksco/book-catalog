server:
  applicationConnectors:
    - type: http
      #port: 8082  # Different port from book-service!
      port: ${PORT:-8082}
  adminConnectors:
    - type: http
      #port: 8083
      port: ${PORT:-8082}  # Use same port on Render

logging:
  level: INFO
  loggers:
    org.example: DEBUG

database:
  driverClass: org.postgresql.Driver
  user: ${DATABASE_USER:-reviewuser}
  password: ${DATABASE_PASSWORD:-reviewpass}
  url: ${DATABASE_URL:-jdbc:postgresql://reviewdb:5432/reviewdb}
  validationQuery: "SELECT 1"

# The fallback is just for when running this directly, docker-compose sets bookServiceUrl
#  When running locally (no Docker), services are on localhost
#  Docker Compose overrides with service names like book-service
#  Render overrides with public URLs
bookServiceUrl: ${BOOK_SERVICE_URL:-http://localhost:8080}